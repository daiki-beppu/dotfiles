# takt グローバル設定
#
# プロバイダ・モデル・言語を全プロジェクト共通で定義する。
# プロジェクト固有のオーバーライドは各リポジトリの .takt/config.yaml で行う。

provider: claude
language: ja

# Persona 単位で provider / model を切り替える。
# - coder は実装で最も動く persona（write_tests / implement / ai_fix /
#   write_tests_fix / fix / finalize_pr の 6 ステップ）。Codex に振り切り、
#   Claude のトークン消費を最大限削減する。
# - reviewer 系 4 persona は Claude/Opus（デフォルト）に戻し、
#   レビューの判断品質を Opus 基準で担保する。
# - planner / supervisor は Opus のまま（明示設定不要）。
#
# 全戻ししたい場合は coder を `model: sonnet` に戻し、
# reviewer 4 種に `provider: codex` を再追加する。
persona_providers:
  coder:
    provider: codex
