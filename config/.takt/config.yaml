# takt グローバル設定
#
# プロバイダ・モデル・言語を全プロジェクト共通で定義する。
# プロジェクト固有のオーバーライドは各リポジトリの .takt/config.yaml で行う。

provider: claude
language: ja

# Persona 単位で provider / model を切り替える。
# - coder は実装で最も動く persona。Codex に寄せて Claude のトークン消費を抑える。
# - planner / reviewer 系 3 persona（architecture-reviewer /
#   ai-antipattern-reviewer / supervisor）は判断品質を Opus 基準で担保するため
#   claude/opus を明示する。
persona_providers:
  planner:
    provider: claude
    model: opus
  coder:
    provider: codex
  architecture-reviewer:
    provider: claude
    model: opus
  ai-antipattern-reviewer:
    provider: claude
    model: opus
  supervisor:
    provider: claude
    model: opus
