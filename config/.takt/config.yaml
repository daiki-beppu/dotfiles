# takt グローバル設定
#
# プロバイダ・モデル・言語を全プロジェクト共通で定義する。
# プロジェクト固有のオーバーライドは各リポジトリの .takt/config.yaml で行う。

provider: claude
language: ja

# Persona 単位で provider / model を切り替える。
# - coder は実装で最も動く persona。Claude Opus に振り切り、
#   実装の判断品質を Opus 基準で担保する。
# - reviewer 系 3 persona（architecture-reviewer / ai-antipattern-reviewer
#   / supervisor）は Codex に寄せ、Claude のトークン消費を抑える。
# - planner はデフォルト（claude/opus）のまま明示設定不要。
persona_providers:
  coder:
    provider: claude
    model: opus
  architecture-reviewer:
    provider: codex
  ai-antipattern-reviewer:
    provider: codex
  supervisor:
    provider: codex
