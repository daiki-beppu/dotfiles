# takt グローバル設定
#
# プロバイダ・モデル・言語を全プロジェクト共通で定義する。
# プロジェクト固有のオーバーライドは各リポジトリの .takt/config.yaml で行う。
#
# 構成方針: Codex + Claude ハイブリッド
# planner / diagnoser は Sol、coder は Luna、レビュー系は Terra。supervisor は Claude。

provider: claude

persona_providers:
  coder:
    provider: codex
    model: gpt-5.6-luna
  planner:
    provider: codex
    model: gpt-5.6-sol
  # diagnose-fix workflow の診断者。1 run に 1 回しか走らず promotion の保険が効かないため、
  # 初手から最強モデルを置く（診断の誤りは自動 fix の誤りに直結する）
  diagnoser:
    provider: codex
    model: gpt-5.6-sol
  ai-antipattern-reviewer:
    provider: codex
    model: gpt-5.6-terra
  architecture-reviewer:
    provider: codex
    model: gpt-5.6-terra
  coding-reviewer:
    provider: codex
    model: gpt-5.6-terra
  cqrs-es-reviewer:
    provider: codex
    model: gpt-5.6-terra
  frontend-reviewer:
    provider: codex
    model: gpt-5.6-terra
  implementation-semantics-reviewer:
    provider: codex
    model: gpt-5.6-terra
  merge-readiness-reviewer:
    provider: codex
    model: gpt-5.6-terra
  qa-reviewer:
    provider: codex
    model: gpt-5.6-terra
  security-reviewer:
    provider: codex
    model: gpt-5.6-terra
  terraform-reviewer:
    provider: codex
    model: gpt-5.6-terra
  testing-reviewer:
    provider: codex
    model: gpt-5.6-terra
language: ja

# ── 実行制御（並列駆動）──
# takt run / watch のタスクを並列実行する。1=逐次、2-10=ワーカープール。
# 空いたワーカーが次のタスクを取得。Ctrl+C は実行中タスクの完了を待つ（graceful shutdown）。
concurrency: 3               # 最大3タスクを同時実行（1-10）
task_poll_interval_ms: 500   # 新規タスク検出のポーリング間隔（100-5000ms）

# ── Observability（OTLP エクスポート / フェーズ単位 usage 計測）──
# OTEL_EXPORTER_OTLP_ENDPOINT 環境変数を設定すると spans/metrics が送信される。
# 未設定でも monitor・session_log・usage_events_phase は動作する。
observability:
  enabled: true
  monitor: true
  session_log_exporter: true
  usage_events_phase: true

# ── Logging ──
logging:
  usage_events: true

# ── コマンド品質ゲート ──
workflow_command_gates:
  custom_scripts: true
