# takt グローバル設定
#
# プロバイダ・モデル・言語を全プロジェクト共通で定義する。
# プロジェクト固有のオーバーライドは各リポジトリの .takt/config.yaml で行う。

provider: claude
language: ja

# Persona 単位で provider / model を切り替える（安定ベースライン）。
# - coder は Codex に寄せて Claude のトークン消費を抑える。
# - planner / reviewer 系（architecture / ai-antipattern / supervisor）は claude/opus で判断・レビュー品質を担保。
# - Codex の rate limit 等で一時的に coder を Claude へ逃がす場合は、この global ではなく
#   各リポジトリの project .takt/config.yaml に persona_providers override を足す（global は触らない）。
persona_providers:
  planner:
    provider: claude
    model: opus
  coder:
    provider: codex
  architecture-reviewer:
    provider: claude
    model: opus
  ai-antipattern-reviewer:
    provider: claude
    model: opus
  supervisor:
    provider: claude
    model: opus
