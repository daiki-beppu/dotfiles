# takt グローバル設定
#
# プロバイダ・モデル・言語を全プロジェクト共通で定義する。
# プロジェクト固有のオーバーライドは各リポジトリの .takt/config.yaml で行う。

provider: claude
language: ja

# ── Observability（OTLP エクスポート / フェーズ単位 usage 計測）──
# OTEL_EXPORTER_OTLP_ENDPOINT 環境変数を設定すると spans/metrics が送信される。
# 未設定でも monitor・session_log・usage_events_phase は動作する。
observability:
  enabled: true
  monitor: true
  session_log_exporter: true
  usage_events_phase: true

# ── Logging ──
logging:
  usage_events: true

# ── コマンド品質ゲート ──
workflow_command_gates:
  custom_scripts: true

# Persona 単位で provider / model を切り替える（安定ベースライン）。
# - top-level provider は claude（claude -p 経路）。
# - coder は Codex に寄せて Claude のトークン消費を抑える。
# - planner / reviewer 系は claude/opus で判断・レビュー品質を担保。
# - リポジトリ単位で coder も Claude に寄せる場合は project .takt/config.yaml で override する。
persona_providers:
  planner:
    provider: claude
    model: opus
  coder:
    provider: codex
  architecture-reviewer:
    provider: claude
    model: opus
  ai-antipattern-reviewer:
    provider: claude
    model: opus
  supervisor:
    provider: claude
    model: opus
  pure-review:
    provider: claude
    model: opus
  pure-reviewer:
    provider: claude
    model: opus
  coding-review:
    provider: claude
    model: opus
  coding-reviewer:
    provider: claude
    model: opus
