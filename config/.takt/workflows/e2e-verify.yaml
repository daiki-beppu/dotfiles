name: e2e-verify
description: Chrome DevTools MCP でブラウザ自動操作による E2E 動作確認（Happy パス + エラー確認）
workflow_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
max_steps: 10
initial_step: plan

steps:
  - name: plan
    edit: false
    persona: e2e-verifier
    knowledge:
      - e2e-testing
    instruction: e2e-verify-plan
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
    output_contracts:
      report:
        - name: e2e-verify-plan.md
          format: e2e-verify-plan
    rules:
      - condition: テスト計画が完了し、検証可能なシナリオがある
        next: verify
      - condition: dev server の起動方法が不明、または検証対象が存在しない
        next: ABORT
        appendix: |
          確認事項:
          - {不明点}

  - name: verify
    edit: false
    persona: e2e-verifier
    knowledge:
      - e2e-testing
    instruction: e2e-verify-execute
    output_contracts:
      report:
        - name: e2e-verify-report.md
          format: e2e-verify-report
    rules:
      - condition: 全シナリオの検証が完了
        next: post-to-pr
      - condition: dev server の起動に失敗、またはブラウザ接続に失敗
        next: ABORT

  - name: post-to-pr
    edit: false
    persona: e2e-verifier
    instruction: e2e-verify-post-pr
    rules:
      - condition: PR body の更新が完了、または PR が存在しない
        next: COMPLETE
