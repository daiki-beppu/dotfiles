name: fix
description: 既知バグ・軽微な指摘を1回のcoder実装+supervisor検証で直す軽量workflow（plan・テスト先行・並列レビューは行わない）
workflow_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
max_steps: 24
initial_step: fix

steps:
  - name: fix
    tags:
      - coding
    edit: true
    persona: coder
    provider: codex
    model: gpt-5.6-luna
    # supervisor の再指摘で同じ coder step が再実行されたら段階的に昇格する。
    promotion:
      - at: 2
        model: gpt-5.6-terra
      - at: 3
        model: gpt-5.6-sol
    policy:
      - coding
      - testing
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: edit
    instruction: fix
    rules:
      - condition: 修正完了
        next: supervise
      - condition: 判断できない、情報不足
        next: ABORT

  - name: supervise
    tags:
      - review
    edit: false
    persona: supervisor
    provider: codex
    model: gpt-5.6-terra
    policy: review
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
          - WebSearch
          - WebFetch
    pass_previous_response: false
    instruction: supervise
    rules:
      - condition: すべて問題なし
        next: COMPLETE
      - condition: 要求未達成、テスト失敗、ビルドエラー
        next: fix_supervisor
    output_contracts:
      report:
        - name: supervisor-validation.md
          format: supervisor-validation
        - name: summary.md
          format: summary
          use_judge: false

  - name: fix_supervisor
    tags:
      - coding
    edit: true
    persona: coder
    provider: codex
    model: gpt-5.6-luna
    # supervisor の再指摘で同じ coder step が再実行されたら段階的に昇格する。
    promotion:
      - at: 2
        model: gpt-5.6-terra
      - at: 3
        model: gpt-5.6-sol
    policy:
      - coding
      - testing
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: edit
    pass_previous_response: false
    instruction: fix-supervisor
    rules:
      - condition: 監督者の指摘に対する修正が完了した
        next: supervise
      - condition: 修正を進行できない
        next: supervise
