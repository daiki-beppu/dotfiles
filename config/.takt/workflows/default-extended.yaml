name: default-extended
description: テスト先行開発ワークフロー（計画 → 計画レビュー → テスト実装 → テスト実装レビュー → 実装 → AIアンチパターンレビュー → 並列レビュー → スコープ外発見の起票 → 完了）
workflow_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
max_steps: 60
initial_step: plan
loop_monitors:
  - cycle:
      - plan_review
      - plan_fix
    threshold: 3
    judge:
      persona: supervisor
      instruction: |
        plan_review と plan_fix のループが {cycle_count} 回繰り返されました。

        各サイクルのレポートを確認し、このループが健全（指摘が反映されている）か、
        非生産的（同じ指摘を繰り返している）かを判断してください。

        **参照するレポート:**
        - 要件レビュー結果: {report:requirements-review.md}
        - 計画レポート: {report:plan.md}

        **判断基準:**
        - 各サイクルで新しい指摘が反映され、計画が改善しているか
        - 同じ指摘が繰り返されていないか
        - 設計の不備が修正されているか
      rules:
        - condition: 健全（指摘が反映されている）
          next: plan_review
        - condition: 非生産的（同じ指摘を繰り返している）
          next: write_tests
  - cycle:
      - write_tests_review
      - write_tests_fix
    threshold: 3
    judge:
      persona: supervisor
      instruction: |
        write_tests_review と write_tests_fix のループが {cycle_count} 回繰り返されました。

        各サイクルのレポートを確認し、このループが健全（指摘が反映されている）か、
        非生産的（同じ指摘を繰り返している）かを判断してください。

        **参照するレポート:**
        - テスト実装レビュー結果: {report:testing-review.md}
        - テスト実装レポート: {report:test-report.md}

        **判断基準:**
        - 各サイクルで新しい指摘が反映され、テストコード品質が改善しているか
        - 同じ指摘が繰り返されていないか
        - 命名・モック・カバレッジの指摘が解消されているか
      rules:
        - condition: 健全（指摘が反映されている）
          next: write_tests_review
        - condition: 非生産的（同じ指摘を繰り返している）
          next: implement
  - cycle:
      - ai_review
      - ai_fix
    threshold: 3
    judge:
      persona: supervisor
      instruction: |
        ai_review と ai_fix のループが {cycle_count} 回繰り返されました。

        各サイクルのレポートを確認し、このループが健全（進捗がある）か、
        非生産的（同じ問題を繰り返している）かを判断してください。

        **参照するレポート:**
        - AIレビュー結果: {report:ai-review.md}

        **判断基準:**
        - 各サイクルで新しい問題が発見・修正されているか
        - 同じ指摘が繰り返されていないか
        - 修正が実際に反映されているか
      rules:
        - condition: 健全（進捗あり）
          next: ai_review
        - condition: 非生産的（改善なし）
          next: reviewers
  - cycle:
      - reviewers
      - fix
    threshold: 3
    judge:
      persona: supervisor
      instruction: loop-monitor-reviewers-fix
      rules:
        - condition: 健全（指摘数が減少、修正が反映されている）
          next: reviewers
        - condition: 非生産的（同じ指摘が繰り返される）
          next: ABORT
steps:
  - name: plan
    edit: false
    persona: planner
    knowledge: architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
          - WebSearch
          - WebFetch
    rules:
      - condition: 要件が明確で実装可能
        next: plan_review
      - condition: ユーザーが質問をしている（実装タスクではない）
        next: COMPLETE
      - condition: 要件が不明確、情報不足
        next: ABORT
        appendix: |
          確認事項:
          - {質問1}
          - {質問2}
    instruction: plan
    output_contracts:
      report:
        - name: plan.md
          format: plan
  - name: plan_review
    edit: false
    persona: requirements-reviewer
    policy:
      - review
    knowledge: architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - WebSearch
          - WebFetch
    instruction: review-requirements
    rules:
      - condition: approved
        next: write_tests
      - condition: needs_fix
        next: plan_fix
    output_contracts:
      report:
        - name: requirements-review.md
          format: requirements-review
  - name: plan_fix
    edit: false
    persona: planner
    knowledge: architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - WebSearch
          - WebFetch
    instruction: plan
    pass_previous_response: false
    rules:
      - condition: 計画修正が完了した
        next: plan_review
      - condition: 修正不能（要件不足）
        next: ABORT
    output_contracts:
      report:
        - name: plan.md
          format: plan
  - name: write_tests
    edit: true
    persona: coder
    policy:
      - coding
      - testing
    knowledge:
      - architecture
      - unit-testing
      - e2e-testing
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: edit
    instruction: write-tests-first
    pass_previous_response: false
    rules:
      - condition: テスト実装が完了した（plan.md を元にテストケースを Red 状態で実装）
        next: write_tests_review
      - condition: テスト対象が未実装のためテスト作成をスキップする
        next: implement
      - condition: テスト作成を進行できない
        next: ABORT
      - condition: ユーザーへの確認事項があるためユーザー入力が必要
        next: write_tests
        requires_user_input: true
        interactive_only: true
    output_contracts:
      report:
        - name: test-report.md
          format: test-report
  - name: write_tests_review
    edit: false
    persona: testing-reviewer
    policy:
      - review
      - testing
    knowledge:
      - architecture
      - unit-testing
      - e2e-testing
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
          - WebSearch
          - WebFetch
    instruction: review-test
    rules:
      - condition: approved
        next: implement
      - condition: needs_fix
        next: write_tests_fix
    output_contracts:
      report:
        - name: testing-review.md
          format: testing-review
  - name: write_tests_fix
    edit: true
    persona: coder
    policy:
      - coding
      - testing
    knowledge:
      - architecture
      - unit-testing
      - e2e-testing
    session: refresh
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: edit
    instruction: write-tests-first
    pass_previous_response: false
    rules:
      - condition: 修正完了
        next: write_tests_review
      - condition: 修正不能
        next: ABORT
    output_contracts:
      report:
        - name: test-report.md
          format: test-report
  - name: implement
    edit: true
    persona: coder
    policy:
      - coding
      - testing
    session: refresh
    knowledge:
      - architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: edit
    instruction: implement-after-tests
    rules:
      - condition: 実装完了
        next: ai_review
      - condition: 実装未着手（レポートのみ）
        next: ai_review
      - condition: 判断できない、情報不足
        next: ai_review
      - condition: ユーザー入力が必要
        next: implement
        requires_user_input: true
        interactive_only: true
    output_contracts:
      report:
        - name: coder-scope.md
          format: coder-scope
        - name: coder-decisions.md
          format: coder-decisions
  - name: ai_review
    edit: false
    persona: ai-antipattern-reviewer
    policy:
      - review
      - ai-antipattern
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - WebSearch
          - WebFetch
    instruction: ai-review
    rules:
      - condition: AI特有の問題なし
        next: reviewers
      - condition: AI特有の問題あり
        next: ai_fix
    output_contracts:
      report:
        - name: ai-review.md
          format: ai-review
  - name: ai_fix
    edit: true
    persona: coder
    policy:
      - coding
      - testing
    session: refresh
    knowledge:
      - architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: edit
    instruction: ai-fix
    pass_previous_response: false
    rules:
      - condition: AI Reviewerの指摘に対する修正が完了した
        next: ai_review
      - condition: 修正不要（指摘対象ファイル/仕様の確認済み）
        next: reviewers
      - condition: 修正を進行できない
        next: reviewers
  - name: reviewers
    parallel:
      - name: arch-review
        edit: false
        persona: architecture-reviewer
        policy:
          - review
        knowledge: architecture
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - WebSearch
              - WebFetch
        rules:
          - condition: approved
          - condition: needs_fix
        instruction: review-arch
        output_contracts:
          report:
            - name: architect-review.md
              format: architecture-review
      - name: supervise
        edit: false
        persona: supervisor
        policy:
          - review
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - Bash
              - WebSearch
              - WebFetch
        instruction: supervise
        rules:
          - condition: すべて問題なし
          - condition: 要求未達成、テスト失敗、ビルドエラー
        output_contracts:
          report:
            - name: supervisor-validation.md
              format: supervisor-validation
            - name: summary.md
              format: summary
              use_judge: false
    rules:
      - condition: all("approved", "すべて問題なし")
        next: report_spillover
      - condition: any("needs_fix", "要求未達成、テスト失敗、ビルドエラー")
        next: fix
  - name: report_spillover
    edit: false
    persona: supervisor
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
    instruction: report-scope-spillover
    pass_previous_response: false
    rules:
      - condition: スコープ外発見なし、または起票完了
        next: finalize_pr
      - condition: 起票判断が不能（gh エラー含む）
        next: finalize_pr
  - name: finalize_pr
    edit: true
    persona: coder
    policy:
      - coding
      - review
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebFetch
    required_permission_mode: edit
    instruction: finalize-pr
    pass_previous_response: false
    rules:
      - condition: PR 作成完了、または既存 PR を検出
        next: COMPLETE
      - condition: 品質チェック失敗（self-review 修正後も CI 不通）
        next: fix
    output_contracts:
      report:
        - name: finalize-pr.md
          format: summary
          use_judge: false
  - name: fix
    edit: true
    persona: coder
    policy:
      - coding
      - testing
    knowledge:
      - architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: edit
    instruction: fix
    pass_previous_response: false
    rules:
      - condition: 修正完了
        next: reviewers
      - condition: 判断できない、情報不足
        next: plan
