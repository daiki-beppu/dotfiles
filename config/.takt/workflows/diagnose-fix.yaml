# 原因不明バグ用 workflow。診断（実コマンドによる再現 → 原因特定）を行い、
# 「原因確定 かつ 修正小規模」の場合のみ fix に自動遷移する。
#
# 設計メモ:
# - ゲートは実コマンドの red/green（テストのみの再現は不可 — テストは現実の縮約であり漏れる）
# - fix_scope の判定は 4 条件（≤3 ファイル / interface 変更なし / 受入 = repro green / 方針 1 つ）。
#   迷ったら large に倒す非対称設計（small の誤判定 = 誤った自動 PR、large の誤判定 = 人間が
#   レポートを一度読むだけ）
# - 自動修正条件を満たさない場合は ABORT で止める（COMPLETE にすると診断用の一時ファイルが
#   PR 化されうる）。診断レポートは structured_output の report_md にあり、起票・振り替えは
#   Claude Code 層（takt-issue skill）が issue skill 経由で行う。workflow は GitHub に触らない
# - fix / supervise は fix.yaml からの複製ベースだが契約が異なる意図的な分岐
#   （前提が「原因は issue に記載」ではなく「原因は直前の診断出力に記載」。repro_command の
#   red→green 実証を義務化）
# - diagnose は 1 run に 1 回のみで promotion の保険が効かないため、persona_providers で
#   diagnoser = Sol（最強）を割り当てる
# - review 系分岐は structured_output + `when:` で Phase 3（状態判定）をスキップ
#   （lite.yaml のトークン設計メモを参照）
name: diagnose-fix
description: preflight 後に原因不明バグを診断（実コマンド再現 → 原因特定）し、条件を満たす場合のみ自動 fix。条件未達は診断レポートを残して停止
workflow_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
max_steps: 15
initial_step: preflight
steps:
  - name: preflight
    persona: coder
    provider: codex
    edit: false
    instruction: |
      実装開始前の環境ゲートを実行すること。
      `.takt/quality-gates/preflight.sh` が通常ファイルとして存在する場合だけ
      `bash .takt/quality-gates/preflight.sh` を実行する。存在しない場合は approved、
      feedback は空文字とする。実行時は終了ステータス 0 を approved、0 以外を blocked とし、
      blocked の feedback にコマンド、終了ステータス、障害出力を記録する。
      判定結果を review-verdict の structured output として返すこと。
    structured_output:
      schema_ref: review-verdict
    rules:
      - when: structured.preflight.verdict == "approved"
        next: diagnose
      - when: structured.preflight.verdict == "blocked"
        next: ABORT
      - when: "true"
        next: ABORT
  - name: diagnose
    tags:
      - plan
    persona: diagnoser
    provider: codex
    edit: true
    required_permission_mode: edit
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    instruction: |
      報告された不具合を診断すること。手順:

      1. **再現ループの構築（最優先）**: バグそのものに対して red になる「実コマンド」を確立し、
         実際に実行して red を確認する。実 CLI の実行・実サーバーへの curl・実データでの実行など。
         テストコードのみによる再現は不可。
      2. **原因の局所化**: 仮説を実行で検証・棄却する。必要なら一時的な計測コード・throwaway
         スクリプトを追加してよい（プロダクションコードの恒久的な変更は禁止。変更してよいのは
         テスト・スクリプト・一時計測コードのみ）。
      3. **判定**: 原因をファイル:行と発生機序で特定できた場合のみ verdict を
         root_cause_confirmed とする。fix_scope は 4 条件（schema の fix_scope_reasons 参照）
         すべてに根拠を書けた場合のみ small。1 つでも書けなければ large。
      4. **報告**: repro_command と evidence には実際に実行したコマンドと出力をそのまま貼る。
         report_md は元 issue へのコメントとしてそのまま使える診断レポートにする。
         修正すべきだがこの issue のスコープ外の問題は followups に記録し、手を触れない。
    structured_output:
      schema_ref: diagnosis-verdict
    rules:
      - when: structured.diagnose.verdict == "root_cause_confirmed" && structured.diagnose.fix_scope == "small"
        next: fix
      - when: "true"
        next: ABORT
        appendix: |
          自動修正の条件未達（inconclusive または fix_scope: large）。
          診断レポートは run ログの structured_output（report_md）を参照。
          起票・workflow 振り替えは Claude Code 層で行うこと。

  - name: fix
    tags:
      - coding
    edit: true
    persona: coder
    provider: codex
    model: gpt-5.6-luna
    # supervise の再指摘で同じ step が再実行されたら段階的に昇格する（fix.yaml と同じ設計）。
    promotion:
      - at: 2
        model: gpt-5.6-terra
      - at: 3
        model: gpt-5.6-sol
    policy:
      - coding
      - testing
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: edit
    pass_previous_response: true
    instruction: |
      直前の診断結果（Previous Response）に基づいて修正すること。原因・修正方針・再現コマンドは
      診断出力の root_cause / fix_policy / repro_command にある。issue 本文より診断結果を優先する。

      手順:
      1. 修正前に repro_command を実行し、red（バグの再現）を確認する。出力を貼る
      2. fix_policy に従って修正する。診断された原因の修正のみを行い、スコープを広げない
      3. 修正後に repro_command を再実行し、green を確認する。出力を貼る
      4. 隣接する既存テストを実行し、回帰がないことを確認する
      5. 診断中に追加された一時計測コード・デバッグ出力を除去する。再現用の throwaway
         スクリプトは、恒久的な回帰テストとして残す価値がある場合のみ整えて残し、
         それ以外は削除する

      応答の末尾に必ず含めること: 実行した repro_command（原文のまま）/ 修正前の red 出力 /
      修正後の green 出力 / 変更ファイル一覧。
    rules:
      - condition: "修正が完了し、repro_command の green 化を実行出力で確認した"
        next: supervise

  - name: supervise
    tags:
      - review
    edit: false
    persona: supervisor
    provider: codex
    model: gpt-5.6-terra
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
          - WebSearch
          - WebFetch
    pass_previous_response: true
    instruction: |
      fix step の完了報告（Previous Response）を鵜呑みにせず、独立に検証すること:

      1. 報告に含まれる repro_command を**自分で再実行**し、green を確認する
         （fix の貼った出力を信用しない）
      2. diff を確認し、診断された原因への修正に閉じているか照合する。診断と無関係な変更・
         スコープ逸脱があれば needs_fix
      3. 一時計測コード・デバッグ出力の残骸がないか diff を確認する
      4. 隣接テストの実行結果を確認する（未実行なら自分で実行する）

      1 件でも問題があれば verdict を needs_fix とし、feedback に「該当箇所 / 問題 / 必要な修正」
      を列挙する。daemon 不達・ネットワーク・権限など、コード変更では解消できない環境障害により
      検証できない場合は、needs_fix ではなく blocked とし、feedback に障害内容を記録する。
      通常の修正で解消可能な検証失敗は needs_fix とする。スコープ外の発見は followups に記録し、
      verdict の判定材料にしない。
    structured_output:
      schema_ref: review-verdict
    rules:
      - when: structured.supervise.verdict == "approved"
        next: COMPLETE
      - when: structured.supervise.verdict == "needs_fix"
        next: fix
      - when: structured.supervise.verdict == "blocked"
        next: ABORT
      - when: "true"
        next: ABORT
