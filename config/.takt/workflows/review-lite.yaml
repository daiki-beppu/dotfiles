# 7観点統合の軽量レビュー workflow（トークン消費削減）。builtin review-takt-default の代替。
# docs/takt-usage-baseline.md 実測: レビュー系 step が全トークン消費の約84%（1 run 約1,600万）。
# 施策1（レビュー観点統合）の実装。gather → 7観点 parallel → supervise の構成を
# review(1体) → supervise(1体) の2 stepに統合し、report ファイル出力を廃止して
# structured_output + `when:` 分岐で Phase 3（状態判定）を完全にスキップする
# （lite.yaml と同じ設計。詳細は lite.yaml のトークン設計メモを参照）。
#
# 統合対応表（7観点 → 統合先）:
#   | builtin reviewer          | 統合先                          | 引き継ぎ方法 |
#   |---------------------------|----------------------------------|--------------|
#   | pure-reviewer              | review step（persona: coding-reviewer） | policy: review を attach |
#   | coding-reviewer             | review step                      | policy: coding を attach |
#   | qa-reviewer                 | review step                      | policy: qa を attach |
#   | ai-antipattern-reviewer     | review step                      | policy: ai-antipattern を attach |
#   | architecture-reviewer       | review step                      | instruction 内チェックリストに要点を吸収（knowledge: architecture は attach しない） |
#   | security-reviewer           | review step                      | instruction 内チェックリストに要点を吸収（knowledge: security は attach しない） |
#   | testing-reviewer            | review step                      | instruction 内チェックリストに要点を吸収（knowledge: unit-testing/e2e-testing は attach しない） |
#   | gather                      | 廃止（review step 冒頭で対象特定も行う） | - |
#   | supervise                   | supervise step（persona: supervisor、維持） | pass_previous_response 経由で review 結果を検証 |
#
# 設計判断（逸脱理由）:
# - pure/coding/qa/ai-antipattern の4つは判定基準そのものが精緻な policy ファイルであり、
#   要約すると精度が落ちるためフル attach する（review.md 1回 + 3 policy ≒ 旧構成で
#   4 reviewer が個別に読んでいた分量の約6割。かつ agent 起動・report生成のオーバーヘッドを
#   3回分削減できる）
# - architecture/security/testing(testing-reviewer) は元々 `knowledge:` 経由の背景知識で
#   分量が大きいため、facet を丸ごと attach せず instruction 内の短いチェックリストとして
#   要点だけ吸収する（plan 015 Step 1 の推奨設計どおり）
# - review-verdict スキーマは verdict: approved/needs_fix の2値のみで「対象不明」を表現できない。
#   builtin gather の ABORT 分岐（対象特定不可）は、review step に「対象不明なら needs_fix とし
#   feedback に理由を明記する」という運用で吸収する（スキーマ変更は lite.yaml に波及するため
#   行わない — plan 015 STOP 条件）
#
# 7観点を個別に厳密実行したい場合（フルレビュー明示依頼時）は builtin review-takt-default を
# 使うこと。takt-review skill の「フル版」節を参照。
#
# トークン設計メモ（lite.yaml を踏襲）:
# - review は structured_output（schema_ref: review-verdict）+ deterministic `when:` で
#   Phase 3（次 step 判定）の LLM 呼び出しを完全にスキップする
# - 分岐は自然言語 condition ではなく `when:` 式（structured.* 参照）を使うこと
# - report ファイル出力（output_contracts）を持たない。phase2_report 回数を 0 にする
# - 全 step provider: codex を明示（lite.yaml との整合。グローバル config のハイブリッド
#   方針（レビュー系 = Claude）はこの workflow には適用しない）
# - 全 step edit: false（read-only レビュー。コード修正は takt-review skill 側が担当）
name: review-lite
max_steps: 4
steps:
  - name: review
    persona: coding-reviewer
    provider: codex
    edit: false
    policy:
      - review
      - qa
      - coding
      - ai-antipattern
    instruction: |
      レビュー対象を特定し、以下の観点を1回のレビューで統合的に確認すること
      （builtin review-takt-default の7観点を1ステップに統合した軽量版）。

      **アタッチされた policy（review / qa / coding / ai-antipattern）がカバーする観点:**
      - マージ可能性（要求充足、既存動作の破壊、要求外変更、テスト不足）
      - コーディング品質（バグ、リグレッション、契約整合、DRY違反、フォールバック濫用）
      - QA・保守性（テスト戦略、カバレッジ、エラーハンドリング、技術的負債）
      - AIアンチパターン（仮定の未検証、幻覚API、配線忘れ、スコープクリープ、デッドコード）

      **追加で確認する観点（要点のみ。専用 knowledge は attach していない）:**
      - アーキテクチャ・設計: ファイル構成・モジュール分割の妥当性、レイヤー設計・依存方向
        （上位→下位のみ）、既存パターンとの一貫性、呼び出しチェーン・配線漏れ
      - セキュリティ: 攻撃者が制御できる入力とその到達範囲、信頼境界の破壊の有無
        （設定の優先順位変更や警告プロンプトの削除だけでは脆弱性と断定しない）
      - テスト品質: 正常系だけでなく代表的な失敗経路の検証有無、モックのみで実連携確認とし
        ていないか、禁止・拒否・非継承の検証が観測単位で行われているか

      手順:
      1. アタッチされた Policy の Source Path を Read ツールで開き、全文を取得する
         （取捨選択しない）
      2. タスクの元要件、計画、変更差分、実行証跡を確認する
      3. 各観点の判定基準を変更差分と照合し、該当する問題を検出する
      4. レビュー対象を特定できない、または情報不足で判定不能な場合は、verdict を
         needs_fix とし、feedback の先頭に「対象不明: {理由}」を明記する
      5. 実装ステップの自己監査（pre-review-checklist）がある場合は鵜呑みにせず、
         diff と実コードに対して独立に照合する
      6. 1件でもブロッキング問題があれば verdict を needs_fix にする。全て問題なければ
         approved にする
    structured_output:
      schema_ref: review-verdict
    rules:
      - when: structured.review.verdict == "approved"
        next: supervise
      - when: structured.review.verdict == "needs_fix"
        next: supervise
      - when: "true"
        next: ABORT

  - name: supervise
    persona: supervisor
    provider: codex
    edit: false
    pass_previous_response: true
    instruction: |
      review step の結果（verdict / feedback）を鵜呑みにせず、要求充足・実行証跡の観点で
      最終検証すること。report ファイルは読まない（review-lite は report を出力しない。
      review 内容は Previous Response の structured_output を参照する）。

      ## review step の結果
      {previous_response}

      - review の verdict・feedback と、タスクの元要件・実行証跡を照合する
      - 矛盾や未確認事項（テスト未実行、証跡なしの「完了」主張等）があれば needs_fix とする
      - review が approved でも、要求の未充足やスコープクリープが見つかれば needs_fix に
        差し戻す
      - feedback には最終的な指摘一覧（review の指摘 + 自身が追加で見つけた問題）を残す
    structured_output:
      schema_ref: review-verdict
    rules:
      - when: "true"
        next: COMPLETE
