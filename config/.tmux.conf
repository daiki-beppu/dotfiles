# tmux設定ファイル

# prefixキーをC-bからC-qに変更
unbind C-b
set -g prefix C-q
bind C-q send-prefix

# ウィンドウとペインのインデックスを1から始める
set -g base-index 1
setw -g pane-base-index 1

# マウス操作を有効化
set -g mouse on

# ウィンドウ分割のキーバインド
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ペインサイズ調整
bind-key -n M-Up resize-pane -U 3
bind-key -n M-Down resize-pane -D 3
bind-key -n M-Left resize-pane -L 3
bind-key -n M-Right resize-pane -R 3

# ペイン移動のキーバインド（vim風）
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ペインリサイズのキーバインド
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# 設定ファイルのリロード
bind-key r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# ステータスバーの設定
set -g status-position bottom
set -g status-style bg=colour234,fg=colour137
set -g status-left ''
set -g status-right '#[fg=colour233,bg=colour241,bold] %Y/%m/%d #[fg=colour233,bg=colour245,bold] %H:%M '
set -g status-right-length 50
set -g status-left-length 20

# ウィンドウステータスの設定
setw -g window-status-current-style fg=colour81,bg=colour238,bold
setw -g window-status-current-format ' #I#[fg=colour250]:#[fg=colour255]#W#[fg=colour50]#F '
setw -g window-status-style fg=colour138,bg=colour235
setw -g window-status-format ' #I#[fg=colour237]:#[fg=colour250]#W#[fg=colour244]#F '

# メッセージの設定
set -g message-style fg=colour232,bg=colour166,bold

# カラー設定
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# escapeキーの遅延を解消
set -sg escape-time 0

# ヒストリの上限
set -g history-limit 10000