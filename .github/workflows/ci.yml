name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  nix-eval:
    name: Nix flake evaluation
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v16
      - name: Evaluate darwin configuration
        run: bash scripts/check.sh nix-eval

  shellcheck:
    name: ShellCheck (severity=error)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck and link-manifest drift check
        run: bash scripts/check.sh shellcheck links
